# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use the sync URL — Alembic doesn't support async natively
sqlalchemy.url = %(DATABASE_URL_SYNC)s

[post_write_hooks]
# Run ruff format after generating migrations
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
