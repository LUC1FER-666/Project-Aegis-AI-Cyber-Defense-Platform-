title: Authentication Brute Force Attempt
id: c5e2f4b2-8a3b-4f6d-9c1e-abcdef123456
status: experimental
description: Detects authentication failures indicative of brute force attacks
author: Aegis AI
date: 2024/01/01
tags:
  - attack.t1110
  - attack.credential_access
logsource:
  category: authentication
detection:
  selection:
    status:
      - failure
      - failed
      - denied
  selection_remote:
    src_ip|re: '^(?!127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)\d+\.\d+\.\d+\.\d+$'
  condition: selection and selection_remote
level: medium
falsepositives:
  - Users who forget their password
  - Automated systems with misconfigured credentials
