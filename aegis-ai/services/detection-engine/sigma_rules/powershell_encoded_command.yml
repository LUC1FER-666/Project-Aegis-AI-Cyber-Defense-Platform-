title: PowerShell Encoded Command Execution
id: ae3a6a51-f11d-4f34-9c28-6de2d7e1e8ab
status: experimental
description: Detects execution of PowerShell with encoded commands, commonly used to obfuscate malicious payloads
author: Aegis AI
date: 2024/01/01
tags:
  - attack.t1059.001
  - attack.execution
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-ec '
      - ' -e '
  filter_legitimate:
    CommandLine|contains:
      - 'WindowsPowerShell\v1.0\powershell.exe -enc'
  condition: selection and not filter_legitimate
level: high
falsepositives:
  - Legitimate administrative scripts using encoded commands
