global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: 'aegis-ai'
    environment: 'development'

scrape_configs:
  - job_name: 'aegis-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: '/metrics'

  - job_name: 'aegis-asset-discovery'
    static_configs:
      - targets: ['asset-discovery:8001']
    metrics_path: '/metrics'

  - job_name: 'aegis-detection-engine'
    static_configs:
      - targets: ['detection-engine:8004']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
