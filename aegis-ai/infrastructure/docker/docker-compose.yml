version: "3.9"

# =============================================================================
# AEGIS AI — Full Local Development Stack
# Run: docker compose up -d
# Stop: docker compose down
# Reset everything: docker compose down -v
# =============================================================================

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: aegis
  POSTGRES_USER: aegis
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-aegis_dev_password}
  ELASTICSEARCH_URL: http://elasticsearch:9200
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_change_in_production_minimum_64_chars_xxxxxxxxxxxx}
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  ENVIRONMENT: development
  LOG_LEVEL: INFO

services:

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis-network

  neo4j:
    image: neo4j:5.15-community
    container_name: aegis-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-aegis_dev_password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aegis-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: aegis-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # Dev only — enable in prod
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m    # Constrained for 16GB host
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aegis-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: aegis-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - aegis-network
    profiles:
      - observability   # Only start with: docker compose --profile observability up

  redis:
    image: redis:7.2-alpine
    container_name: aegis-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: aegis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - aegis-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: aegis-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aegis-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aegis-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: aegis-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    networks:
      - aegis-network
    profiles:
      - observability

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: aegis-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.assets.discovered --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.telemetry.raw --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.telemetry.normalized --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.threat-intel.feeds --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.threat-intel.enriched --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.detections.alerts --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.detections.correlated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.incidents.created --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.incidents.updated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.agents.tasks --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.agents.results --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.response.proposed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.response.approved --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.response.executed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.graph.updates --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aegis.audit.events --partitions 3 --replication-factor 1
        echo 'All topics created.'
        kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - aegis-network

  # ---------------------------------------------------------------------------
  # MONITORING
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: aegis-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aegis-network
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.2.3
    container_name: aegis-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - aegis-network
    profiles:
      - observability

  # ---------------------------------------------------------------------------
  # AEGIS SERVICES
  # ---------------------------------------------------------------------------

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: aegis-gateway
    environment:
      <<: *common-env
      SERVICE_NAME: gateway
      SERVICE_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./services/gateway:/app
      - ./shared/python:/shared
    networks:
      - aegis-network
    restart: unless-stopped

  asset-discovery:
    build:
      context: ./services/asset-discovery
      dockerfile: Dockerfile
    container_name: aegis-asset-discovery
    environment:
      <<: *common-env
      SERVICE_NAME: asset-discovery
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./services/asset-discovery:/app
      - ./shared/python:/shared
    networks:
      - aegis-network
    cap_add:
      - NET_RAW        # Required for network scanning
      - NET_ADMIN
    restart: unless-stopped

  telemetry-collector:
    build:
      context: ./services/telemetry-collector
      dockerfile: Dockerfile
    container_name: aegis-telemetry
    environment:
      <<: *common-env
      SERVICE_NAME: telemetry-collector
      SERVICE_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./services/telemetry-collector:/app
      - ./shared/python:/shared
    networks:
      - aegis-network
    restart: unless-stopped

  detection-engine:
    build:
      context: ./services/detection-engine
      dockerfile: Dockerfile
    container_name: aegis-detection
    environment:
      <<: *common-env
      SERVICE_NAME: detection-engine
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./services/detection-engine:/app
      - ./shared/python:/shared
    networks:
      - aegis-network
    restart: unless-stopped

networks:
  aegis-network:
    driver: bridge
    name: aegis-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  elasticsearch_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  prometheus_data:
  grafana_data:
